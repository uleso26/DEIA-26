name: t2d-intelligence-platform

services:
  app:
    build: .
    command: ["python3", "main.py", "backend-status"]
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: t2d_intelligence
      USE_MONGODB_BACKEND: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
      USE_NEO4J_BACKEND: "true"
      SYNC_TO_MONGODB: "true"
      SYNC_TO_NEO4J: "true"
    volumes:
      - .:/app
    depends_on:
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1;"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  mcp-safety:
    build: .
    command: ["python3", "-m", "mcp_servers.safety_server"]
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: t2d_intelligence
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
    volumes:
      - .:/app

  mcp-trials:
    build: .
    command: ["python3", "-m", "mcp_servers.trials_server"]
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: t2d_intelligence
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
      USE_MONGODB_BACKEND: "true"
    volumes:
      - .:/app
    depends_on:
      mongodb:
        condition: service_healthy

  mcp-knowledge:
    build: .
    command: ["python3", "-m", "mcp_servers.knowledge_server"]
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: t2d_intelligence
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
      USE_NEO4J_BACKEND: "true"
    volumes:
      - .:/app
    depends_on:
      neo4j:
        condition: service_healthy
