project:
  name: T2D Therapeutic Intelligence Platform
  version: 0.1.0

paths:
  sqlite_db: data/processed/t2d_platform.db
  mongo_dir: data/processed/mongo
  graph_file: data/processed/neo4j_graph.json
  retrieval_manifest: data/processed/retrieval_manifest.json
  trace_dir: logs/query_traces

runtime:
  bootstrap_on_query: true
  top_k_retrieval: 3
  max_tool_results: 5

services:
  use_live_sources: false
  sync_to_mongodb: false
  sync_to_neo4j: false

governance:
  rule_file: governance/governance_rules.yaml
